# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/medicine_reminder_db
spring.datasource.username=root
spring.datasource.password=pavani
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# (Optional but recommended - let Hibernate auto detect)
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# JACKSON (JSON handling)
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

# ===============================
# LOGGING
# ===============================
logging.level.com.medicinereminder=DEBUG
logging.level.org.springframework=DEBUG

# ===============================
# ERROR DEBUGGING (IMPORTANT)
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always